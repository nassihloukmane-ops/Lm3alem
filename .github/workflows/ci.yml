# Build de vérification à chaque push sur main.
# Le déploiement Hostinger se fait sur le serveur via : bash scripts/deploy.sh
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Hostinger
        run: npm run build:hostinger

      - name: Vérifier artefacts
        run: |
          test -f out/index.html
          test -f out/robots.txt
          test -f out/sitemap.xml
          test -f out/favicon.ico
          test -f out/logo.png
